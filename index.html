// ─── HELPERS ─────────────────────────────────────────────────────────────────

function metricScore(v, floor, healthy, strong) {
  if (v === null || v === undefined || isNaN(v)) return null;
  if (v >= strong) return 100;
  if (v >= healthy) return 70 + 30 * (v - healthy) / (strong - healthy);
  if (v >= floor) return 40 + 30 * (v - floor) / (healthy - floor);
  return Math.max(0, 40 * v / floor);
}
function computeVerdict(roas, nur, ltvCac, score, bm, isInactive, isInsuf) {
  if (isInactive) return 'Inactive';
  if (isInsuf) return 'Insufficient Data';
  if (!bm) return 'Unindexed';
  let breaches = 0;
  if (roas !== null && roas < bm.roasF) breaches++;
  if (nur !== null && nur < bm.nurF) breaches++;
  if (ltvCac !== null && ltvCac < bm.ltvF) breaches++;
  if (breaches >= 3) return 'Cut';
  if (breaches === 2 && (score === null || score < 20)) return 'Cut';
  if (breaches === 2) return 'Reduce';
  if (breaches === 1) return 'Optimise';
  if (score === null) return 'Insufficient Data';
  if (score >= 70) return 'Scale';
  if (score >= 50) return 'Maintain';
  if (score >= 35) return 'Optimise';
  if (score >= 20) return 'Reduce';
  return 'Cut';
}
function mColor(v, floor, healthy, strong) {
  if (v === null || v === undefined || isNaN(v)) return '#4b5563';
  if (strong != null && v >= strong) return '#22c55e';
  if (healthy != null && v >= healthy) return '#3b82f6';
  if (floor != null && v >= floor) return '#f59e0b';
  return '#ef4444';
}
function fmt(n, type) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (type === 'rs') return '₹' + Math.round(n).toLocaleString('en-IN');
  if (type === 'rsk') return n >= 100000 ? '₹' + (n / 100000).toFixed(1) + 'L' : n >= 1000 ? '₹' + (n / 1000).toFixed(0) + 'K' : '₹' + Math.round(n);
  if (type === 'x') return n.toFixed(2) + 'x';
  if (type === '%') return (n * 100).toFixed(0) + '%';
  if (type === 'int') return Math.round(n).toLocaleString('en-IN');
  return n.toFixed(1);
}
function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v.getTime()) ? null : v;
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));

  }
  if (typeof v === 'string') {
    const s = v.trim();
    if (!s) return null;
    const d = new Date(s.length >= 10 ? s.slice(0, 10) : s);
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}
function toISODate(d) {

}
function daysBetween(a, b) {

// ─── CSV PARSER ──────────────────────────────────────────────────────────────

function parseCSV(text) {
  const rows = [];
  let row = [],
    field = '',
    inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i + 1] === '"') {
        field += '"';
        i++;
      } else {
        inQuote = !inQuote;
      }
    } else if (c === ',' && !inQuote) {
      row.push(field);
      field = '';
    } else if ((c === '\n' || c === '\r') && !inQuote) {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field);
      field = '';
      if (row.length > 0) rows.push(row);
      row = [];
    } else {
      field += c;
    }
  }
  if (field !== '' || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}

// ─── DATA FETCH ──────────────────────────────────────────────────────────────

async function fetchAllDataFromSheets() {
  const fetchGid = gid => fetch(SHEET_BASE + gid).then(r => {
    if (!r.ok) throw new Error(`Sheet ${gid} returned ${r.status}`);
    return r.text();
  });
  const [condText, ...rawTexts] = await Promise.all([fetchGid(CONDITIONS_GID), ...RAW_SHEET_CFGS.map(c => fetchGid(c.gid))]);
  const ltvMap = {
    ...LTV_TABLE
  };
  const condRows = parseCSV(condText);
  let inLtv = false;
  for (const row of condRows) {
    const a = String(row[0] || '').trim();
    if (a.toLowerCase() === 'gc category') {
      inLtv = true;
      continue;
    }
    if (inLtv) {
      if (!a || a.startsWith('B.') || a.startsWith('--')) break;
      const ltv = parseFloat(row[3]);
      if (a && !isNaN(ltv) && ltv > 0) ltvMap[a.toLowerCase()] = ltv;
    }
  }
  return {
    rawTexts,
    ltvMap
  };
}

// ─── PARSE ALL RAW ROWS ─────────────────────────────────────────────────────

function parseAllRows(rawTexts) {
  const allRows = [];
  RAW_SHEET_CFGS.forEach(({
    type,
    hdrSkip
  }, idx) => {
    const rows = parseCSV(rawTexts[idx]);
    rows.slice(hdrSkip).forEach(row => {
      if (!row || row.length < 4) return;
      const name = String(row[3] || '').trim();
      if (!name || name.toLowerCase() === 'campaign name') return;
      const parsed = extractRow(row, type);
      if (parsed && parsed.date) allRows.push(parsed);
    });
  });
  return allRows;
}

// ─── AGGREGATE CAMPAIGNS ─────────────────────────────────────────────────────

function aggregateCampaigns(allRows, ltvMap, startDate, endDate) {
  const windowRows = allRows.filter(r => r.date >= startDate && r.date <= endDate);

  // Group by campaign (lowercased key)
  const groups = {};
  windowRows.forEach(r => {
    const key = r.campaign.toLowerCase();
    if (!groups[key]) {
      groups[key] = {
        name: r.campaign,
        type: r.type,
        hasMetrics: r.hasMetrics,
        segment: r.segment,
        brand: r.brand,
        category: r.category,
        rows: []
      };
    }
    if (!groups[key].segment && r.segment) groups[key].segment = r.segment;
    if (!groups[key].brand && r.brand) groups[key].brand = r.brand;
    if (!groups[key].category && r.category) groups[key].category = r.category;
    if (r.hasMetrics) groups[key].hasMetrics = true;
    groups[key].rows.push(r);
  });

  // Also compute total historical days for isInsuf check
  const histDays = {};
  allRows.forEach(r => {
    const key = r.campaign.toLowerCase();
    if (!histDays[key]) histDays[key] = new Set();
    if (r.date) histDays[key].add(r.date.toDateString());
  });

  // Check last activity for inactive (across all data)
  const globalMaxDate = endDate;
  const campaigns = [];
  Object.entries(groups).forEach(([key, data]) => {
    const {
      rows
    } = data;
    const segment = data.segment || 'Unindexed';
    const {
      brand,
      category,
      hasMetrics
    } = data;
    const totSpend = rows.reduce((s, r) => s + r.spend, 0);
    const totDS = rows.reduce((s, r) => s + r.directSales, 0);
    const totNU = rows.reduce((s, r) => s + r.newUsers, 0);
    const totDQ = rows.reduce((s, r) => s + r.directQty, 0);
    const totIQ = rows.reduce((s, r) => s + r.indirectQty, 0);
    const totImp = rows.reduce((s, r) => s + r.impressions, 0);
    const totAtc = rows.reduce((s, r) => s + (r.directAtc || 0), 0);
    let avgPos = null;
    const posRows = rows.filter(r => r.position && r.position > 0 && r.impressions > 0);
    if (posRows.length > 0) {
      const totI = posRows.reduce((s, r) => s + r.impressions, 0);
      avgPos = posRows.reduce((s, r) => s + r.position * r.impressions, 0) / (totI || 1);
    }
    const totQty = totDQ + totIQ;
    const roas = totSpend > 0 ? totDS > 0 ? totDS / totSpend : 0 : null;
    const nur = totQty > 0 ? totNU / totQty : null;
    const ltv = ltvMap[(category || '').toLowerCase()] || null;
    const cac = totNU > 0 ? totSpend / totNU : null;
    const ltvCac = ltv && cac ? ltv / cac : null;
    const allDates = histDays[key] || new Set();
    const winDates = [...new Set(rows.map(r => r.date?.toDateString()).filter(Boolean))];
    const lastDateAll = allRows.filter(r => r.campaign.toLowerCase() === key).reduce((m, r) => r.date > m ? r.date : m, new Date(0));
    const daysSinceLive = daysBetween(lastDateAll, globalMaxDate);
    const isInactive = daysSinceLive > 1;
    const isInsuf = allDates.size < 10;
    const bm = BENCHMARKS[segment] || null;
    let roasScore = null,
      nurScore = null,
      ltvScore = null,
      score = null;
    if (bm && hasMetrics) {
      roasScore = roas !== null ? metricScore(roas, bm.roasF, bm.roasH, bm.roasS) : null;
      nurScore = nur !== null ? metricScore(nur, bm.nurF, bm.nurH, bm.nurS) : null;
      ltvScore = ltvCac !== null ? metricScore(ltvCac, bm.ltvF, bm.ltvH, bm.ltvS) : null;
      if (roasScore !== null && nurScore !== null && ltvScore !== null) score = roasScore * bm.roasWt + nurScore * bm.nurWt + ltvScore * bm.ltvWt;
    }
    const verdict = hasMetrics ? computeVerdict(roas, nur, ltvCac, score, bm, isInactive, isInsuf) : 'Insufficient Data';
    campaigns.push({
      campaign: data.name,
      brand,
      category,
      segment,
      type: data.type,
      spend: totSpend,
      directSales: totDS,
      impressions: totImp,
      newUsers: totNU,
      totalQty: totQty,
      directQty: totDQ,
      indirectQty: totIQ,
      directAtc: totAtc,
      roas,
      nur,
      ltvCac,
      ltv,
      cac,
      roasScore,
      nurScore,
      ltvScore,
      score,
      verdict,
      daysLive: allDates.size,
      windowDays: winDates.length,
      isInactive,
      isInsuf,
      avgPos
    });
  });
  return campaigns.sort((a, b) => (b.spend || 0) - (a.spend || 0));
}
function getDateBounds(allRows) {
  let min = new Date('2099-01-01'),
    max = new Date('2000-01-01');
  allRows.forEach(r => {
    if (r.date < min) min = r.date;
    if (r.date > max) max = r.date;
  });
  return {
    min,
    max
