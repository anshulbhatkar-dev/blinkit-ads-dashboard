function metricScore(v, floor, healthy, strong) {
  if (v === null || v === undefined || isNaN(v)) return null;
  if (v >= strong) return 100;
  if (v >= healthy) return 70 + 30 * (v - healthy) / (strong - healthy);
  if (v >= floor) return 40 + 30 * (v - floor) / (healthy - floor);
  return Math.max(0, 40 * v / floor);
}
function computeVerdict(roas, nur, ltvCac, score, bm, isInactive, isInsuf) {

  let breaches = 0;
  if (roas !== null && roas < bm.roasF) breaches++;
  if (nur !== null && nur < bm.nurF) breaches++;
  if (ltvCac !== null && ltvCac < bm.ltvF) breaches++;
  if (breaches >= 3) return 'Cut';
  if (breaches === 2 && (score === null || score < 20)) return 'Cut';
  if (breaches === 2) return 'Reduce';
  if (breaches === 1) return 'Optimise';
  if (score === null) return 'Insufficient Data';
  if (score >= 70) return 'Scale';
  if (score >= 50) return 'Maintain';
  if (score >= 35) return 'Optimise';
  if (score >= 20) return 'Reduce';
  return 'Cut';
}

function parseCSV(text) {
  const rows = [];
  let row = [],
    field = '',
    inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i + 1] === '"') {
        field += '"';
        i++;
      } else {
        inQuote = !inQuote;
      }
    } else if (c === ',' && !inQuote) {
      row.push(field);
      field = '';
    } else if ((c === '\n' || c === '\r') && !inQuote) {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field);
      field = '';
      if (row.length > 0) rows.push(row);
      row = [];
    } else {
      field += c;
    }
  }
  if (field !== '' || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}

const IDB_NAME = 'blinkit_dash',
  IDB_STORE = 'sheets';
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => {
      e.target.result.createObjectStore(IDB_STORE);
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise(res => {
      const tx = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
      tx.onsuccess = () => {
        res(tx.result);
        db.close();
      };
      tx.onerror = () => {
        res(null);
        db.close();
      };
    });
  } catch (e) {
    return null;
  }
}
async function idbSet(key, val) {
  try {
    const db = await idbOpen();
    await new Promise(res => {
      const tx = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(val, key);
      tx.onsuccess = res;
      tx.onerror = res;
    });
    db.close();
  } catch (e) {}
}
async function clearSheetCache() {
  try {
    const db = await idbOpen();
    await new Promise(res => {
      const tx = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).clear();
      tx.onsuccess = res;
      tx.onerror = res;
    });
    db.close();
  } catch (e) {}
  // also clear legacy localStorage keys (frees the old quota)
  try {
    Object.keys(localStorage).filter(k => k.startsWith('blinkit_sheet_')).forEach(k => localStorage.removeItem(k));
  } catch (e) {}
}

// ─── DATA FETCH ──────────────────────────────────────────────────────────────

async function fetchAllDataFromSheets() {
  SCHEMA_WARNINGS = []; // reset once per load; sales + ad-sheet parsers append
  const today = new Date();
  const cutoffDate = new Date(today.getFullYear(), today.getMonth() - 3, 1);
  const CACHE_TTL = 4 * 60 * 60 * 1000; // 4 hours in ms

  // one-time: free legacy localStorage quota
  try {
    Object.keys(localStorage).filter(k => k.startsWith('blinkit_sheet_')).forEach(k => localStorage.removeItem(k));
  } catch (e) {}
  const fetchWithCache = async gid => {
    const cacheKey = `blinkit_sheet_${gid}`;
    const cached = await idbGet(cacheKey);
    if (cached && cached.ts && Date.now() - cached.ts < CACHE_TTL) return cached.data;
    const r = await fetch(SHEET_BASE + gid);
    if (!r.ok) throw new Error(`Sheet ${gid} returned ${r.status}`);
    const text = await r.text();
    idbSet(cacheKey, {
      ts: Date.now(),
      data: text
    }); // fire-and-forget
    return text;
  };
  const [condText, idxText, salesText, bkText, ...rawTexts] = await Promise.all([fetchWithCache(CONDITIONS_GID), fetchWithCache(CAMPAIGN_IDX_GID), fetchWithCache(SALES_IMPORT_GID), fetchWithCache(BK_SEARCH_GID).catch(() => ''),
  // optional feed — dashboard works without it
  ...RAW_SHEET_CFGS.map(c => fetchWithCache(c.gid))]);

  // Parse BK search volume: hdr rows 1-4, A=keyword, B=type, C=comp brand,
  // D=category, E=trending volume (search drr), F+= monthly columns (trend)
  const kwVolume = {};
  if (bkText) {
    parseCSV(bkText).slice(4).forEach(row => {
      const kw = String(row[0] || '').trim().toLowerCase();
      if (!kw) return;
      const drr = parseFloat(String(row[4] || '').replace(/,/g, '')) || 0;
      if (drr <= 0) return;
      const monthly = [];
      for (let i = 5; i < row.length; i++) {
        const v = parseFloat(String(row[i] || '').replace(/,/g, ''));
        if (!isNaN(v) && v > 0) monthly.push(v);
      }
      let trend = null;
      if (monthly.length >= 2) {
        const prev = monthly[monthly.length - 2],
          cur = monthly[monthly.length - 1];
        if (prev > 0) trend = (cur - prev) / prev;
      }
      kwVolume[kw] = {
        drr,
        type: String(row[1] || '').trim(),
        compBrand: String(row[2] || '').trim(),
        category: String(row[3] || '').trim(),
        trend
      };
    });
  }

  // Parse LTV from Conditions sheet
  const ltvMap = {
    ...LTV_TABLE
  };
  const condRows = parseCSV(condText);
  let inLtv = false;
  for (const row of condRows) {
    const a = String(row[0] || '').trim();
    if (a.toLowerCase() === 'gc category') {
      inLtv = true;
      continue;
    }
    if (inLtv) {
      if (!a || a.startsWith('B.') || a.startsWith('--')) break;
      const ltv = parseFloat(row[3]);
      if (a && !isNaN(ltv) && ltv > 0) ltvMap[a.toLowerCase()] = ltv;
    }
  }

  // Parse campaign-level segment index from Rough Analysis sheet
  // Three column groups: A/B (cols 0/1), J/K (cols 9/10)
  // Col with campaign name paired with Generic Head / Generic Tail / Comp
  const VALID_SEGS = new Set(['Generic Head', 'Generic Tail', 'Comp', 'Brand', 'Add to Index']);
  const campaignIndexMap = {};
  const idxRows = parseCSV(idxText);
  const INDEX_COL_PAIRS = [[0, 1], [9, 10]]; // [nameCol, typeCol]
  for (const row of idxRows) {
    for (const [nc, tc] of INDEX_COL_PAIRS) {
      const name = String(row[nc] || '').trim();
      const seg = String(row[tc] || '').trim();
      if (name && VALID_SEGS.has(seg)) {
        campaignIndexMap[name.toLowerCase()] = seg;
      }
    }
  }

  // Parse Sales import: skip 4 header rows; date=col1, units=col4, brand=col7, gc_cat=col8
  // salesAgg[`${brand}||${cat}`][dateTimestamp] = totalUnits
  // Dates are in DD-MM-YYYY format (e.g. "01-03-2026" = 1 March 2026)
  const salesAgg = {};
  const salesRows = parseCSV(salesText);
  // Resolve Sales-import columns by header name (fallback to fixed positions).
  let sH = -1;
  for (let i = 0; i < Math.min(8, salesRows.length); i++) {
    const nr = (salesRows[i] || []).map(normHdr);
    if (nr.includes('units') && nr.includes('brand')) {
      sH = i;
      break;
    }
  }
  const sHdr = sH >= 0 ? salesRows[sH].map(normHdr) : [];
  const colS = (names, fb) => {
    for (const nm of names) {
      const i = sHdr.indexOf(nm);
      if (i >= 0) return i;
    }
    return fb;
  };
  const sDate = colS(['date'], 1),
    sUnits = colS(['units'], 4),
    sBrand = colS(['brand'], 7),
    sCat = colS(['gc cat', 'gc category', 'category'], 8);
  if (sH >= 0 && sHdr.indexOf('gc cat') < 0 && sHdr.indexOf('gc category') < 0) {
    SCHEMA_WARNINGS.push('Sales Import: category column not found by name — using last-known position');
  }
  const salesStart = sH >= 0 ? sH + 1 : 4;
  salesRows.slice(salesStart).forEach(row => {
    if (!row || !row[sDate]) return;
    const dateStr = String(row[sDate] || '').trim();
    const parts = dateStr.split('-');
    const d = parts.length === 3 ? new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0])) : null;
    if (!d || isNaN(d.getTime())) return;
    const brand = String(row[sBrand] || '').trim();
    const cat = String(row[sCat] || '').trim();
    const units = parseFloat(row[sUnits]) || 0;
    if (!brand || !cat || units <= 0) return;
    const k = `${brand}||${cat}`;
    if (!salesAgg[k]) salesAgg[k] = {};
    const ts = d.getTime();
    salesAgg[k][ts] = (salesAgg[k][ts] || 0) + units;
  });
  return {
    rawTexts,
    ltvMap,
    campaignIndexMap,
    salesAgg,
    kwVolume,
    cutoffDate
  };
}

// ─── PARSE ALL RAW ROWS ─────────────────────────────────────────────────────

function parseAllRows(rawTexts) {
  const allRows = [];
  RAW_SHEET_CFGS.forEach(({
    type,
    hdrSkip
  }, idx) => {
    const rows = parseCSV(rawTexts[idx]);
    const h = findHeaderRow(rows); // locate header by name
    const headerRow = h >= 0 ? rows[h] : rows[Math.max(0, hdrSkip - 1)] || [];
    const dataStart = h >= 0 ? h + 1 : hdrSkip; // data starts after header
    const {
      C,
      missing
    } = resolveCols(headerRow, type);
    const crit = missing.filter(f => CRITICAL_FIELDS.includes(f));
    if (crit.length) {
      SCHEMA_WARNINGS.push(`${type} sheet: column(s) ${crit.join(', ')} not found by name — using last-known position`);
      console.warn('[schema drift]', type, 'missing headers:', crit);
    }
    rows.slice(dataStart).forEach(row => {
      if (!row || row.length < 4) return;
      const parsed = extractRow(row, type, C);
      if (parsed && parsed.date) allRows.push(parsed);
    });
  });
  // Filter to only keep rows within the 4-month window
  const cutoff = new Date(new Date().getFullYear(), new Date().getMonth() - 3, 1);
  return allRows.filter(r => r.date && r.date >= cutoff);
}

// ─── AGGREGATE CAMPAIGNS ─────────────────────────────────────────────────────

function aggregateCampaigns(allRows, ltvMap, startDate, endDate, campaignIndexMap = {}) {
  const numDays = Math.round((endDate - startDate) / 864e5) + 1; // period length for DRR
  const windowRows = allRows.filter(r => r.date >= startDate && r.date <= endDate);

  // Group by campaign (lowercased key)
  const groups = {};
  windowRows.forEach(r => {
    const key = r.campaign.toLowerCase();
    if (!groups[key]) {
      groups[key] = {
        name: r.campaign,
        type: r.type,
        hasMetrics: r.hasMetrics,
        segment: null,
        segCounts: {},
        brand: r.brand,
        category: r.category,
        rows: []
      };
    }
    if (r.segment) groups[key].segCounts[r.segment] = (groups[key].segCounts[r.segment] || 0) + 1;
    if (!groups[key].brand && r.brand) groups[key].brand = r.brand;
    if (!groups[key].category && r.category) groups[key].category = r.category;
    if (r.hasMetrics) groups[key].hasMetrics = true;
    groups[key].rows.push(r);
  });

  // Also compute total historical days + cumulative spend for isInsuf check
  const histDays = {};
  const histSpend = {};
  allRows.forEach(r => {
    const key = r.campaign.toLowerCase();
    if (!histDays[key]) {
      histDays[key] = new Set();
      histSpend[key] = 0;
    }
    if (r.date) histDays[key].add(r.date.toDateString());
    histSpend[key] += r.spend || 0;
  });

  // Check last activity for inactive (across all data)
  const globalMaxDate = endDate;
  const campaigns = [];
  Object.entries(groups).forEach(([key, data]) => {
    const {
      rows
    } = data;
    // Segment = MODE of row-level tags (col AK tracks the live keyword mix).
    // Rough Analysis index is fallback only — it goes stale (e.g. Brand campaigns
    // indexed as Generic Tail; the index has no Brand entries at all).
    const segEntries = Object.entries(data.segCounts || {});
    const modeSeg = segEntries.length ? segEntries.sort((a, b) => b[1] - a[1])[0][0] : null;
    const segment = modeSeg || campaignIndexMap[key] || 'Unindexed';
    const {
      brand,
      category,
      hasMetrics
    } = data;
    const totSpend = rows.reduce((s, r) => s + r.spend, 0);
    const totDS = rows.reduce((s, r) => s + r.directSales, 0);
    const totNU = rows.reduce((s, r) => s + r.newUsers, 0);
    const totDQ = rows.reduce((s, r) => s + r.directQty, 0);
    const totIQ = rows.reduce((s, r) => s + r.indirectQty, 0);
    const totImp = rows.reduce((s, r) => s + r.impressions, 0);
    const totAtc = rows.reduce((s, r) => s + (r.directAtc || 0), 0);

    // Budget utilization: de-dupe by date (budget is campaign-level, repeated per keyword row)
    const budgetByDate = {};
    rows.forEach(r => {
      if (r.date && r.budget > 0) {
        const dk = r.date.toDateString();
        budgetByDate[dk] = Math.max(budgetByDate[dk] || 0, r.budget);
      }
    });
    const totBudget = Object.values(budgetByDate).reduce((s, v) => s + v, 0);
    const utilization = totBudget > 0 ? totSpend / totBudget : null;

    // Weighted avg CPM by impressions
    const cpmRows = rows.filter(r => r.cpm > 0 && r.impressions > 0);
    const cpmImp = cpmRows.reduce((s, r) => s + r.impressions, 0);
    const avgCpm = cpmImp > 0 ? cpmRows.reduce((s, r) => s + r.cpm * r.impressions, 0) / cpmImp : null;

    // Total ROAS (direct + indirect), weighted by impressions
    const troasRows = rows.filter(r => r.totalRoasRaw > 0 && r.impressions > 0);
    const troasImp = troasRows.reduce((s, r) => s + r.impressions, 0);
    const avgTotalRoas = troasImp > 0 ? troasRows.reduce((s, r) => s + r.totalRoasRaw * r.impressions, 0) / troasImp : null;

    // Indirect sales total
    const totIS = rows.reduce((s, r) => s + (r.indirectSales || 0), 0);

    // Hours live — unique per (date, campaign), so de-dupe by date
    const hoursLiveByDate = {};
    rows.forEach(r => {
      if (r.date && r.hoursLive > 0) {
        const dk = r.date.toDateString();
        hoursLiveByDate[dk] = Math.max(hoursLiveByDate[dk] || 0, r.hoursLive);
      }
    });
    const totHoursLive = Object.values(hoursLiveByDate).reduce((s, v) => s + v, 0);

    // Last change detection for CPM and budget (track day-over-day changes)
    const dailyMeta = {};
    rows.forEach(r => {
      const dk = r.date?.toDateString();
      if (!dk) return;
      if (!dailyMeta[dk]) dailyMeta[dk] = {
        date: r.date,
        cpm: 0,
        budget: 0,
        spend: 0,
        sales: 0
      };
      dailyMeta[dk].cpm = Math.max(dailyMeta[dk].cpm, r.cpm || 0);
      dailyMeta[dk].budget = Math.max(dailyMeta[dk].budget, r.budget || 0);
      dailyMeta[dk].spend += r.spend || 0;
      dailyMeta[dk].sales += r.directSales || 0;
    });
    const dailyList = Object.values(dailyMeta).sort((a, b) => a.date - b.date);
    let lastCpmChange = null,
      lastBudgetChange = null;
    let prevCpmBefore = null,
      prevBudgetBefore = null;
    let lastCpmValue = null,
      lastBudgetValue = null;
    let prevDayCpm = null,
      prevDayBudget = null;
    for (const day of dailyList) {
      if (prevDayCpm !== null && day.cpm > 0 && Math.abs(day.cpm - prevDayCpm) > 0.5) {
        lastCpmChange = day.date;
        prevCpmBefore = prevDayCpm;
        lastCpmValue = day.cpm;
      }
      if (prevDayBudget !== null && day.budget > 0 && Math.abs(day.budget - prevDayBudget) > 1) {
        lastBudgetChange = day.date;
        prevBudgetBefore = prevDayBudget;
        lastBudgetValue = day.budget;
      }
      if (day.cpm > 0) prevDayCpm = day.cpm;
      if (day.budget > 0) prevDayBudget = day.budget;
    }
    const currentDailyBudget = dailyList.length > 0 ? dailyList[dailyList.length - 1].budget || null : null;
    const lastChange = lastCpmChange || lastBudgetChange ? [lastCpmChange, lastBudgetChange].filter(Boolean).reduce((a, b) => a > b ? a : b) : null;

    // Incremental ROAS after last budget hike — did the extra spend actually buy sales?
    // pre = up to 5 days before the change, post = up to 7 days from the change.
    let iRoas = null,
      iRoasDeltaSpend = null,
      iRoasDeltaSales = null,
      iRoasPostDays = null;
    if (lastBudgetChange) {
      const pre = dailyList.filter(d => d.date < lastBudgetChange).slice(-5);
      const post = dailyList.filter(d => d.date >= lastBudgetChange).slice(0, 7);
      if (pre.length >= 2 && post.length >= 2) {
        const avg = (arr, f) => arr.reduce((s, d) => s + f(d), 0) / arr.length;
        const dSp = avg(post, d => d.spend) - avg(pre, d => d.spend);
        const dSa = avg(post, d => d.sales) - avg(pre, d => d.sales);
        if (dSp > 200) {
          // only meaningful hikes
          iRoas = dSa / dSp;
          iRoasDeltaSpend = dSp;
          iRoasDeltaSales = dSa;
          iRoasPostDays = post.length;
        }
      }
    }

    // Daily run rate (DRR) — absolute metrics divided by period length
    const drr = {
      spend: totSpend / numDays,
      directSales: totDS / numDays,
      impressions: totImp / numDays,
      totalQty: (totDQ + totIQ) / numDays,
      newUsers: totNU / numDays,
      directAtc: totAtc / numDays
    };
    let avgPos = null;
    const posRows = rows.filter(r => r.position && r.position > 0 && r.impressions > 0);
    if (posRows.length > 0) {
      const totI = posRows.reduce((s, r) => s + r.impressions, 0);
      avgPos = posRows.reduce((s, r) => s + r.position * r.impressions, 0) / (totI || 1);
    }
    const totQty = totDQ + totIQ;
    const roas = totSpend > 0 ? totDS > 0 ? totDS / totSpend : 0 : null;
    const nur = totQty > 0 ? totNU / totQty : null;
    const ltv = ltvMap[(category || '').toLowerCase()] || null;
    const cac = totNU > 0 ? totSpend / totNU : null;
    const ltvCac = ltv && cac ? ltv / cac : null;
    const allDates = histDays[key] || new Set();
    const winDates = [...new Set(rows.map(r => r.date?.toDateString()).filter(Boolean))];
    const lastDateAll = allRows.filter(r => r.campaign.toLowerCase() === key).reduce((m, r) => r.date > m ? r.date : m, new Date(0));
    const daysSinceLive = daysBetween(lastDateAll, globalMaxDate);
    const isInactive = daysSinceLive > 1;
    // q-comm verdicts shouldn't wait 10 days if the campaign has already burned real money:
    // insufficient only if BOTH <10 days live AND <₹3K cumulative historical spend
    const isInsuf = allDates.size < 10 && (histSpend[key] || 0) < 3000;
    const bm = BENCHMARKS[segment] || null;
    let roasScore = null,
      nurScore = null,
      ltvScore = null,
      score = null;
    if (bm && hasMetrics) {
      roasScore = roas !== null ? metricScore(roas, bm.roasF, bm.roasH, bm.roasS) : null;
      nurScore = nur !== null ? metricScore(nur, bm.nurF, bm.nurH, bm.nurS) : null;
      ltvScore = ltvCac !== null ? metricScore(ltvCac, bm.ltvF, bm.ltvH, bm.ltvS) : null;
      if (roasScore !== null && nurScore !== null && ltvScore !== null) score = roasScore * bm.roasWt + nurScore * bm.nurWt + ltvScore * bm.ltvWt;
    }

    // 7-day trend score: same composite on just the last 7 days of the window.
    // Catches campaigns collapsing this week that period averages still mask.
    let score7 = null,
      trend = null;
    if (bm && hasMetrics && numDays >= 10) {
      const t7start = new Date(endDate.getTime() - 6 * 864e5);
      const rows7 = rows.filter(r => r.date >= t7start);
      if (rows7.length > 0) {
        const s7 = rows7.reduce((s, r) => s + r.spend, 0);
        const ds7 = rows7.reduce((s, r) => s + r.directSales, 0);
        const nu7 = rows7.reduce((s, r) => s + r.newUsers, 0);
        const q7 = rows7.reduce((s, r) => s + r.directQty + r.indirectQty, 0);
        const roas7 = s7 > 0 ? ds7 / s7 : null;
        const nur7 = q7 > 0 ? nu7 / q7 : null;
        const cac7 = nu7 > 0 ? s7 / nu7 : null;
        const ltvCac7 = ltv && cac7 ? ltv / cac7 : null;
        const rs = roas7 !== null ? metricScore(roas7, bm.roasF, bm.roasH, bm.roasS) : null;
        const ns = nur7 !== null ? metricScore(nur7, bm.nurF, bm.nurH, bm.nurS) : null;
        const ls = ltvCac7 !== null ? metricScore(ltvCac7, bm.ltvF, bm.ltvH, bm.ltvS) : null;
        if (rs !== null && ns !== null && ls !== null) score7 = rs * bm.roasWt + ns * bm.nurWt + ls * bm.ltvWt;
      }
      if (score !== null && score7 !== null && totSpend / numDays >= 300) {
        if (score7 <= score - 20) trend = 'deteriorating';else if (score7 >= score + 20) trend = 'improving';
      }
    }

    // Since-change verdict: if budget/CPM changed, judge the campaign AS CONFIGURED
    // NOW (≥5 days of post-change data). Period score stays as context — old
    // context is never lost, the verdict just stops averaging over dead config.
    let scoreSince = null,
      roasSince = null,
      nurSince = null,
      ltvCacSince = null;
    let sinceDays = 0,
      verdictBasis = 'period',
      settling = false;
    if (lastChange && bm && hasMetrics) {
      const rowsSince = rows.filter(r => r.date >= lastChange);
      sinceDays = new Set(rowsSince.map(r => r.date.toDateString())).size;
      if (sinceDays >= 5) {
        const sS = rowsSince.reduce((t, r) => t + r.spend, 0);
        const dsS = rowsSince.reduce((t, r) => t + r.directSales, 0);
        const nuS = rowsSince.reduce((t, r) => t + r.newUsers, 0);
        const qS = rowsSince.reduce((t, r) => t + r.directQty + r.indirectQty, 0);
        roasSince = sS > 0 ? dsS / sS : null;
        nurSince = qS > 0 ? nuS / qS : null;
        const cacS = nuS > 0 ? sS / nuS : null;
        ltvCacSince = ltv && cacS ? ltv / cacS : null;
        const rsS = roasSince !== null ? metricScore(roasSince, bm.roasF, bm.roasH, bm.roasS) : null;
        const nsS = nurSince !== null ? metricScore(nurSince, bm.nurF, bm.nurH, bm.nurS) : null;
        const lsS = ltvCacSince !== null ? metricScore(ltvCacSince, bm.ltvF, bm.ltvH, bm.ltvS) : null;
        if (rsS !== null && nsS !== null && lsS !== null) {
          scoreSince = rsS * bm.roasWt + nsS * bm.nurWt + lsS * bm.ltvWt;
          verdictBasis = 'since-change';
        }
      } else settling = true;
    }
    const verdict = segment === 'Brand' ? isInactive ? 'Inactive' : 'Not Scored' // Brand: metrics ready, no scoring by design
    : verdictBasis === 'since-change' ? computeVerdict(roasSince, nurSince, ltvCacSince, scoreSince, bm, isInactive, isInsuf) : hasMetrics ? computeVerdict(roas, nur, ltvCac, score, bm, isInactive, isInsuf) : 'Insufficient Data';
    campaigns.push({
      campaign: data.name,
      brand,
      category,
      segment,
      type: data.type,
      spend: totSpend,
      directSales: totDS,
      indirectSales: totIS,
      impressions: totImp,
      newUsers: totNU,
      totalQty: totQty,
      directQty: totDQ,
      indirectQty: totIQ,
      directAtc: totAtc,
      drr,
      utilization,
      numDays,
      avgCpm,
      avgTotalRoas,
      totHoursLive,
      hoursPerDay: totHoursLive / numDays,
      currentDailyBudget,
      lastCpmChange,
      lastBudgetChange,
      lastChange,
      prevCpmBefore,
      lastCpmValue,
      prevBudgetBefore,
      lastBudgetValue,
      roas,
      nur,
      ltvCac,
      ltv,
      cac,
      roasScore,
      nurScore,
      ltvScore,
      score,
      score7,
      trend,
      scoreSince,
      roasSince,
      sinceDays,
      verdictBasis,
      settling,
      iRoas,
      iRoasDeltaSpend,
      iRoasDeltaSales,
      iRoasPostDays,
      verdict,
      daysLive: allDates.size,
      windowDays: winDates.length,
      isInactive,
      isInsuf,
      avgPos
    });
  });

  // Peer percentile: ROAS rank within own segment (spend ≥ ₹500/d, ≥5 peers)
  const bySegPeers = {};
  campaigns.forEach(c => {
    if ((c.drr?.spend || 0) >= 500 && c.roas != null && c.segment) {
      (bySegPeers[c.segment] = bySegPeers[c.segment] || []).push(c.roas);
    }
  });
  Object.values(bySegPeers).forEach(a => a.sort((x, y) => x - y));
  campaigns.forEach(c => {
    const arr = bySegPeers[c.segment];
    c.peerPct = arr && arr.length >= 5 && c.roas != null && (c.drr?.spend || 0) >= 500 ? Math.round(arr.filter(v => v <= c.roas).length / arr.length * 100) : null;
  });
  return campaigns.sort((a, b) => (b.spend || 0) - (a.spend || 0));
}

// ─── KEYWORD-LEVEL AGGREGATION ───────────────────────────────────────────────

function aggregateKeywords(allRows, ltvMap, startDate, endDate, campaignIndexMap = {}) {
  const numDays = Math.round((endDate - startDate) / 864e5) + 1;
  const windowRows = allRows.filter(r => r.date >= startDate && r.date <= endDate && r.keyword && r.type === 'Search');
  const groups = {};
  windowRows.forEach(r => {
    const key = `${r.campaign.toLowerCase()}||${r.keyword.toLowerCase()}`;
    if (!groups[key]) groups[key] = {
      keyword: r.keyword,
      campaign: r.campaign,
      segment: r.segment,
      brand: r.brand,
      category: r.category,
      rows: []
    };
    if (!groups[key].segment && r.segment) groups[key].segment = r.segment;
    groups[key].rows.push(r);
  });
  const keywords = [];
  Object.entries(groups).forEach(([key, data]) => {
    const {
      rows
    } = data;
    const segment = data.segment || campaignIndexMap[data.campaign.toLowerCase()] || 'Unindexed';
    const totSpend = rows.reduce((s, r) => s + r.spend, 0);
    const totDS = rows.reduce((s, r) => s + r.directSales, 0);
    const totNU = rows.reduce((s, r) => s + r.newUsers, 0);
    const totDQ = rows.reduce((s, r) => s + r.directQty, 0);
    const totIQ = rows.reduce((s, r) => s + r.indirectQty, 0);
    const totImp = rows.reduce((s, r) => s + r.impressions, 0);
    const totQty = totDQ + totIQ;
    const posRows = rows.filter(r => r.position > 0 && r.impressions > 0);
    const posImp = posRows.reduce((s, r) => s + r.impressions, 0);
    const avgPos = posImp > 0 ? posRows.reduce((s, r) => s + r.position * r.impressions, 0) / posImp : null;
    const cpmRows = rows.filter(r => r.cpm > 0 && r.impressions > 0);
    const cpmImp = cpmRows.reduce((s, r) => s + r.impressions, 0);
    const avgCpm = cpmImp > 0 ? cpmRows.reduce((s, r) => s + r.cpm * r.impressions, 0) / cpmImp : null;
    const roas = totSpend > 0 ? totDS / totSpend : null;
    const nur = totQty > 0 ? totNU / totQty : null;
    const ltv = ltvMap[(data.category || '').toLowerCase()] || null;
    const cac = totNU > 0 ? totSpend / totNU : null;
    const ltvCac = ltv && cac ? ltv / cac : null;
    const drr = {
      spend: totSpend / numDays,
      directSales: totDS / numDays,
      impressions: totImp / numDays,
      totalQty: totQty / numDays,
      newUsers: totNU / numDays
    };
    keywords.push({
      keyword: data.keyword,
      campaign: data.campaign,
      brand: data.brand,
      category: data.category,
      segment,
      spend: totSpend,
      directSales: totDS,
      impressions: totImp,
      newUsers: totNU,
      totalQty: totQty,
      directQty: totDQ,
      indirectQty: totIQ,
      drr,
      numDays,
      roas,
      nur,
      ltvCac,
      cac,
      avgPos,
      avgCpm
    });
  });
  return keywords.sort((a, b) => (b.spend || 0) - (a.spend || 0));
}

// ─── KEYWORD-LEVEL AGGREGATION (flattened to keyword, with campaign drill-down) ──

function aggregateKeywordsByKw(allRows, ltvMap, startDate, endDate, campaignIndexMap = {}) {
  const numDays = Math.round((endDate - startDate) / 864e5) + 1;
  const windowRows = allRows.filter(r => r.date >= startDate && r.date <= endDate && r.keyword && r.type === 'Search');

  // Group by keyword only (across all campaigns)
  const kwGroups = {};
  windowRows.forEach(r => {
    const kw = r.keyword.toLowerCase();
    if (!kwGroups[kw]) kwGroups[kw] = {
      keyword: r.keyword,
      brands: new Set(),
      categories: new Set(),
      segments: new Set(),
      rows: [],
      campRows: {}
    };
    kwGroups[kw].rows.push(r);
    kwGroups[kw].brands.add(r.brand || '');
    kwGroups[kw].categories.add(r.category || '');
    // Per-campaign rows
    const campKey = r.campaign || '(no campaign)';
    if (!kwGroups[kw].campRows[campKey]) kwGroups[kw].campRows[campKey] = {
      campaign: r.campaign,
      brand: r.brand,
      category: r.category,
      segment: r.segment || campaignIndexMap[r.campaign?.toLowerCase()] || 'Other',
      rows: []
    };
    kwGroups[kw].campRows[campKey].rows.push(r);
  });
  return Object.values(kwGroups).map(g => {
    const {
      rows,
      campRows
    } = g;
    const totSpend = rows.reduce((s, r) => s + r.spend, 0);
    const totDS = rows.reduce((s, r) => s + r.directSales, 0);
    const totNU = rows.reduce((s, r) => s + r.newUsers, 0);
    const totDQ = rows.reduce((s, r) => s + r.directQty, 0);
    const totIQ = rows.reduce((s, r) => s + r.indirectQty, 0);
    const totImp = rows.reduce((s, r) => s + r.impressions, 0);
    const totQty = totDQ + totIQ;
    const posRows = rows.filter(r => r.position > 0 && r.impressions > 0);
    const posImp = posRows.reduce((s, r) => s + r.impressions, 0);
    const avgPos = posImp > 0 ? posRows.reduce((s, r) => s + r.position * r.impressions, 0) / posImp : null;
    const cpmRows = rows.filter(r => r.cpm > 0 && r.impressions > 0);
    const cpmImp = cpmRows.reduce((s, r) => s + r.impressions, 0);
    const avgCpm = cpmImp > 0 ? cpmRows.reduce((s, r) => s + r.cpm * r.impressions, 0) / cpmImp : null;
    const roas = totSpend > 0 ? totDS / totSpend : null;
    const nur = totQty > 0 ? totNU / totQty : null;
    const drr = {
      spend: totSpend / numDays,
      directSales: totDS / numDays,
      impressions: totImp / numDays,
      totalQty: totQty / numDays,
      newUsers: totNU / numDays
    };

    // Per-campaign breakdown
    const campaigns = {};
    Object.entries(campRows).forEach(([camp, cd]) => {
      const cr = cd.rows;
      const cSpend = cr.reduce((s, r) => s + r.spend, 0);
      const cDS = cr.reduce((s, r) => s + r.directSales, 0);
      const cNU = cr.reduce((s, r) => s + r.newUsers, 0);
      const cDQ = cr.reduce((s, r) => s + r.directQty, 0);
      const cIQ = cr.reduce((s, r) => s + r.indirectQty, 0);
      const cImp = cr.reduce((s, r) => s + r.impressions, 0);
      const cQty = cDQ + cIQ;
      const cCpmR = cr.filter(r => r.cpm > 0 && r.impressions > 0);
      const cCpmI = cCpmR.reduce((s, r) => s + r.impressions, 0);
      const cPosR = cr.filter(r => r.position > 0 && r.impressions > 0);
      const cPosI = cPosR.reduce((s, r) => s + r.impressions, 0);
      campaigns[camp] = {
        campaign: cd.campaign,
        brand: cd.brand,
        category: cd.category,
        segment: cd.segment,
        spend: cSpend,
        directSales: cDS,
        newUsers: cNU,
        directQty: cDQ,
        impressions: cImp,
        roas: cSpend > 0 ? cDS / cSpend : null,
        nur: cQty > 0 ? cNU / cQty : null,
        avgCpm: cCpmI > 0 ? cCpmR.reduce((s, r) => s + r.cpm * r.impressions, 0) / cCpmI : null,
        avgPos: cPosI > 0 ? cPosR.reduce((s, r) => s + r.position * r.impressions, 0) / cPosI : null,
        drr: {
          spend: cSpend / numDays,
          directSales: cDS / numDays,
          impressions: cImp / numDays,
          totalQty: cQty / numDays,
          newUsers: cNU / numDays
        }
      };
    });

    // Pick primary brand/segment from highest-spend campaign
    const topCamp = Object.values(campaigns).sort((a, b) => (b.spend || 0) - (a.spend || 0))[0];
    return {
      keyword: g.keyword,
      brand: topCamp?.brand || '',
      category: topCamp?.category || '',
      segment: topCamp?.segment || 'Other',
      campaignCount: Object.keys(campaigns).length,
      spend: totSpend,
      directSales: totDS,
      impressions: totImp,
      newUsers: totNU,
      totalQty: totQty,
      directQty: totDQ,
      drr,
      numDays,
      roas,
      nur,
      avgPos,
      avgCpm,
      campaigns
    };
  }).sort((a, b) => (b.spend || 0) - (a.spend || 0));
}

// ─── CATEGORY-LEVEL AGGREGATION ──────────────────────────────────────────────

function computeMetrics(rows, numDays) {
  const totSpend = rows.reduce((s, r) => s + (r.spend || 0), 0);
  const totDS = rows.reduce((s, r) => s + (r.directSales || 0), 0);
  const totDQ = rows.reduce((s, r) => s + (r.directQty || 0), 0);
  const totImp = rows.reduce((s, r) => s + (r.impressions || 0), 0);
  const cpmRows = rows.filter(r => r.cpm > 0 && r.impressions > 0);
  const cpmImp = cpmRows.reduce((s, r) => s + r.impressions, 0);
  const avgCpm = cpmImp > 0 ? cpmRows.reduce((s, r) => s + r.cpm * r.impressions, 0) / cpmImp : null;
  // avgPos weighted by impressions
  const posRows = rows.filter(r => r.position > 0 && r.impressions > 0);
  const posImp = posRows.reduce((s, r) => s + r.impressions, 0);
  const avgPos = posImp > 0 ? posRows.reduce((s, r) => s + r.position * r.impressions, 0) / posImp : null;
  // current daily budget: dedupe by date, take max per date, use last date's value
  const budgetByDate = {};
  rows.forEach(r => {
    if (r.date && r.budget > 0) {
      const dk = r.date.toDateString();
      budgetByDate[dk] = Math.max(budgetByDate[dk] || 0, r.budget);
    }
  });
  const budgetDates = Object.keys(budgetByDate).sort();
  const currentDailyBudget = budgetDates.length > 0 ? budgetByDate[budgetDates[budgetDates.length - 1]] : null;
  return {
    directQty: totDQ,
    spend: totSpend,
    directSales: totDS,
    impressions: totImp,
    avgCpm,
    avgPos,
    currentDailyBudget,
    directRoas: totSpend > 0 ? totDS / totSpend : null,
    drrDQ: totDQ / numDays,
    drrSpend: totSpend / numDays,
    drrImp: totImp / numDays,
    numDays
  };
}

// Flat keyword-level aggregation for Cat. Sales tab
// Returns: [{brand, category, segment, keyword, ...metrics, campaigns:{name→metrics}}]
function aggregateForCatSales(allRows, startDate, endDate, campaignIndexMap = {}, salesAgg = {}) {
  const numDays = Math.round((endDate - startDate) / 864e5) + 1;
  const win = allRows.filter(r => r.date >= startDate && r.date <= endDate && r.hasMetrics);
  const VALID_SEGS = new Set(['Generic Head', 'Generic Tail', 'Comp', 'Brand', 'Add to Index']);

  // Campaign-level segment: use mode (most common) per campaign from row data
  const campaignSegCounts = {};
  win.forEach(r => {
    const key = (r.campaign || '').toLowerCase();
    if (r.segment && VALID_SEGS.has(r.segment)) {
      if (!campaignSegCounts[key]) campaignSegCounts[key] = {};
      campaignSegCounts[key][r.segment] = (campaignSegCounts[key][r.segment] || 0) + 1;
    }
  });
  const campaignSegMap = {};
  Object.entries(campaignSegCounts).forEach(([key, counts]) => {
    campaignSegMap[key] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  });

  // Flat group key: brand||category||segment||keyword
  const groups = {};
  win.forEach(r => {
    if (!r.category) return;
    const campKey = (r.campaign || '').toLowerCase();
    const seg = campaignSegMap[campKey] || campaignIndexMap[campKey] || 'Other';
    const kw = r.keyword || seg; // no keyword → use segment as keyword label
    const camp = r.campaign || '(no campaign)';
    const gk = `${r.brand || ''}||${r.category}||${seg}||${kw}`;
    if (!groups[gk]) groups[gk] = {
      brand: r.brand || '',
      category: r.category,
      segment: seg,
      keyword: kw,
      camps: {}
    };
    if (!groups[gk].camps[camp]) groups[gk].camps[camp] = [];
    groups[gk].camps[camp].push(r);
  });

  // Track ad DQ per brand||category (for organic computation)
  const catAdDQ = {};
  win.forEach(r => {
    const ck = `${r.brand || ''}||${r.category}`;
    catAdDQ[ck] = (catAdDQ[ck] || 0) + (r.directQty || 0);
  });
  const result = Object.values(groups).map(({
    brand,
    category,
    segment,
    keyword,
    camps
  }) => {
    const allRows2 = [];
    const campaigns = {};
    Object.entries(camps).forEach(([camp, rows]) => {
      campaigns[camp] = computeMetrics(rows, numDays);
      allRows2.push(...rows);
    });
    return {
      brand,
      category,
      segment,
      keyword,
      ...computeMetrics(allRows2, numDays),
      campaigns
    };
  });

  // Add Organic rows: one per brand||category that has sales import data
  const seen = new Set(result.map(r => `${r.brand}||${r.category}`));
  seen.forEach(ck => {
    const byDate = salesAgg[ck] || {};
    let totalSalesDQ = 0;
    Object.entries(byDate).forEach(([ts, u]) => {
      const d = new Date(parseInt(ts));
      if (d >= startDate && d <= endDate) totalSalesDQ += u;
    });
    const organicDQ = Math.max(0, totalSalesDQ - (catAdDQ[ck] || 0));
    if (totalSalesDQ > 0) {
      const [brand, category] = ck.split('||');
      result.push({
        brand,
        category,
        segment: 'Organic',
        keyword: 'Organic',
        drrDQ: organicDQ / numDays,
        drrSpend: 0,
        directQty: organicDQ,
        spend: 0,
        directSales: null,
        impressions: 0,
        avgCpm: null,
        directRoas: null,
        numDays,
        campaigns: {}
      });
    }
  });
  return result;
}

// Nested Category → Segment → Keyword → Campaign aggregation for Sales Flow tab
function aggregateByCategory(allRows, startDate, endDate, campaignIndexMap = {}, salesAgg = {}) {
  const numDays = Math.round((endDate - startDate) / 864e5) + 1;
  const win = allRows.filter(r => r.date >= startDate && r.date <= endDate && r.hasMetrics);
  const VALID_SEGS_BC = new Set(['Generic Head', 'Generic Tail', 'Comp', 'Brand', 'Add to Index']);
  const campaignSegCounts2 = {};
  win.forEach(r => {
    const key = (r.campaign || '').toLowerCase();
    if (r.segment && VALID_SEGS_BC.has(r.segment)) {
      if (!campaignSegCounts2[key]) campaignSegCounts2[key] = {};
      campaignSegCounts2[key][r.segment] = (campaignSegCounts2[key][r.segment] || 0) + 1;
    }
  });
  const campaignSegMap = {};
  Object.entries(campaignSegCounts2).forEach(([key, counts]) => {
    campaignSegMap[key] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  });
  const groups = {};
  win.forEach(r => {
    if (!r.category) return;
    const ck = `${r.brand || ''}||${r.category}`;
    if (!groups[ck]) groups[ck] = {
      brand: r.brand || '',
      category: r.category,
      data: {}
    };
    const campKey = (r.campaign || '').toLowerCase();
    const seg = campaignSegMap[campKey] || campaignIndexMap[campKey] || 'Other';
    const kw = r.keyword || seg;
    const camp = r.campaign || '(no campaign)';
    if (!groups[ck].data[seg]) groups[ck].data[seg] = {};
    if (!groups[ck].data[seg][kw]) groups[ck].data[seg][kw] = {};
    if (!groups[ck].data[seg][kw][camp]) groups[ck].data[seg][kw][camp] = [];
    groups[ck].data[seg][kw][camp].push(r);
  });
  return Object.values(groups).map(({
    brand,
    category,
    data
  }) => {
    const segs = {};
    const allCatRows = [];
    Object.entries(data).forEach(([seg, kwMap]) => {
      const keywords = {};
      const allSegRows = [];
      Object.entries(kwMap).forEach(([kw, campMap]) => {
        const campaigns = {};
        const allKwRows = [];
        Object.entries(campMap).forEach(([camp, rows]) => {
          campaigns[camp] = computeMetrics(rows, numDays);
          allKwRows.push(...rows);
        });
        keywords[kw] = {
          ...computeMetrics(allKwRows, numDays),
          campaigns
        };
        allSegRows.push(...allKwRows);
      });
      segs[seg] = {
        ...computeMetrics(allSegRows, numDays),
        keywords
      };
      allCatRows.push(...allSegRows);
    });
    // Add Organic segment: totalSales (from Sales import) − totalAdDQ
    const salesKey = `${brand}||${category}`;
    const byDate = salesAgg[salesKey] || {};
    let totalSalesDQ = 0;
    Object.entries(byDate).forEach(([ts, u]) => {
      const d = new Date(parseInt(ts));
      if (d >= startDate && d <= endDate) totalSalesDQ += u;
    });
    const totalAdDQ = allCatRows.reduce((s, r) => s + (r.directQty || 0), 0);
    const organicDQ = Math.max(0, totalSalesDQ - totalAdDQ);
    if (totalSalesDQ > 0) {
      segs['Organic'] = {
        drrDQ: organicDQ / numDays,
        drrSpend: 0,
        directQty: organicDQ,
        spend: 0,
        directSales: null,
        impressions: 0,
        avgCpm: null,
        directRoas: null,
        numDays,
        keywords: {}
      };
    }
    const adMet = computeMetrics(allCatRows, numDays);
    // Category-level drrDQ = total (ads + organic); other metrics stay ad-only
    return {
      brand,
      category,
      ...adMet,
      drrDQ: totalSalesDQ > 0 ? totalSalesDQ / numDays : adMet.drrDQ,
      segs
    };
  });
}
function getDateBounds(allRows) {
  let min = new Date('2099-01-01'),
    max = new Date('2000-01-01');
  allRows.forEach(r => {
    if (r.date < min) min = r.date;
    if (r.date > max) max = r.date;
  });
  return {
    min,
    max
  };
}

// ─── SUDDEN-CHANGE ALERT ENGINE ──────────────────────────────────────────────
// Last 2 days vs prior 7-day baseline. Catches bid intensification, budget
// choke, conversion breaks. Always runs on the latest data date (bounds.max),
// independent of the selected analysis period.

function computeAlerts(allRows, refDate, campaignIndexMap = {}, ladder = {}) {
  if (!refDate) return [];
  const DAY = 864e5;
  const dayKey = d => d.toDateString();
  const recentKeys = [dayKey(new Date(refDate.getTime() - DAY)), dayKey(refDate)];
  const baseKeys = [];
  for (let i = 8; i >= 2; i--) baseKeys.push(dayKey(new Date(refDate.getTime() - i * DAY)));

  // per-campaign per-day stats + per-brand×category daily impressions
  const camps = {};
  const catImp = {};
  allRows.forEach(r => {
    if (!r.date) return;
    const dk = dayKey(r.date);
    const ck = r.campaign.toLowerCase();
    if (!camps[ck]) camps[ck] = {
      name: r.campaign,
      brand: r.brand,
      category: r.category,
      segment: null,
      hasMetrics: r.hasMetrics,
      days: {}
    };
    if (r.hasMetrics) camps[ck].hasMetrics = true;
    if (!camps[ck].segment && r.segment) camps[ck].segment = r.segment;
    const c = camps[ck];
    if (!c.days[dk]) c.days[dk] = {
      impr: 0,
      spend: 0,
      sales: 0,
      qty: 0,
      nu: 0,
      posN: 0,
      posI: 0,
      cpmN: 0,
      cpmI: 0,
      hours: 0,
      budget: 0
    };
    const d = c.days[dk];
    d.impr += r.impressions || 0;
    d.spend += r.spend || 0;
    d.sales += r.directSales || 0;
    d.qty += (r.directQty || 0) + (r.indirectQty || 0);
    d.nu += r.newUsers || 0;
    if (r.position > 0 && r.impressions > 0) {
      d.posN += r.position * r.impressions;
      d.posI += r.impressions;
    }
    if (r.cpm > 0 && r.impressions > 0) {
      d.cpmN += r.cpm * r.impressions;
      d.cpmI += r.impressions;
    }
    d.hours = Math.max(d.hours, r.hoursLive || 0);
    d.budget = Math.max(d.budget, r.budget || 0);
    const catK = `${r.brand || ''}||${r.category || ''}`;
    if (!catImp[catK]) catImp[catK] = {};
    catImp[catK][dk] = (catImp[catK][dk] || 0) + (r.impressions || 0);
  });

  // Day-of-week factors (portfolio impressions, last 28d): Sunday peaks must not
  // make Monday look like a crash. Volume thresholds scale by the day's factor.
  const dowAgg = [0, 0, 0, 0, 0, 0, 0];
  const dowDays = [new Set(), new Set(), new Set(), new Set(), new Set(), new Set(), new Set()];
  const d28 = new Date(refDate.getTime() - 27 * DAY);
  allRows.forEach(r => {
    if (!r.date || r.date < d28 || r.date > refDate) return;
    dowAgg[r.date.getDay()] += r.impressions || 0;
    dowDays[r.date.getDay()].add(r.date.toDateString());
  });
  const dowAvgArr = dowAgg.map((v, i) => dowDays[i].size ? v / dowDays[i].size : 0);
  const dowVals = dowAvgArr.filter(v => v > 0);
  const dowMean = dowVals.length ? dowVals.reduce((s, v) => s + v, 0) / dowVals.length : 1;
  const dowF = dowAvgArr.map(v => v > 0 ? v / dowMean : 1);
  const alerts = [];
  Object.entries(camps).forEach(([ck, c]) => {
    // must be live now (spend in last 2 days)
    if (!recentKeys.some(k => c.days[k] && c.days[k].spend > 0)) return;
    // need a stable baseline: ≥4 of 7 baseline days with activity
    const baseDataDays = baseKeys.filter(k => c.days[k] && (c.days[k].impr > 0 || c.days[k].spend > 0));
    if (baseDataDays.length < 4) return;
    const B = f => baseDataDays.reduce((s, k) => s + f(c.days[k]), 0) / baseDataDays.length;
    const R = f => recentKeys.reduce((s, k) => s + (c.days[k] ? f(c.days[k]) : 0), 0) / recentKeys.length;
    const wavgB = (nf, df) => {
      let n = 0,
        i = 0;
      baseDataDays.forEach(k => {

      if (campByKey[key]) (driverMap[key] = driverMap[key] || []).push(a);else standaloneKw.push(a);
    });
    const rows = [...alerts.map(a => {
      const drivers = (driverMap[a.campaign.toLowerCase() + '||' + fam(a)] || []).sort((x, y) => (y.severity || 0) - (x.severity || 0));
      let kw,
        kwIsDriver = false;
      if (drivers.length) {
        kw = drivers.map(d => `"${d.keyword}" ${d.flags.map(f => f.label).join(', ')}`).join('  |  ');
        kwIsDriver = true;
      } else {
        const list = campKwMap[a.campaign.toLowerCase()] || [];
        kw = list.length ? list.slice(0, 3).map(k => `"${k.keyword}"`).join(', ') + (list.length > 3 ? ` +${list.length - 3} more` : '') : '';
      }
      return {
        lvl: 'Campaign',
        key: 'al_' + a.campaign,
        name: a.campaign,
        tag: `${a.brand || ''} · ${a.category || ''}`,
        campaign: a.campaign,
        sev: a.severity,
        flags: a.flags,
        cause: a.cause,
        brand: a.brand,
        category: a.category,
        segment: a.segment,
        baseSpend: a.baseSpend,
        recSpend: a.recSpend,
        baseImpr: a.baseImpr,
        recImpr: a.recImpr,
        kw,
        kwIsDriver
      };
    }), ...standaloneKw.map(a => ({
      lvl: 'Keyword',
      key: 'kw_' + a.keyword,
      name: `"${a.keyword}"`,
      tag: a.campaign || '',
      campaign: a.campaign || '',
      sev: a.severity,
      flags: a.flags,
      cause: a.cause,
      brand: a.brand,
      category: a.category,
      segment: null,
      baseSpend: a.baseSpend,
      recSpend: a.recSpend,
      baseImpr: null,
      recImpr: null,
      kw: `"${a.keyword}"`,
      kwIsDriver: true
    }))].sort((x, y) => y.sev - x.sev);
    return rows;
  }, [alerts, kwAlerts, campKwMap]);
  const live = useMemo(() => campaigns.filter(c => !c.isInactive), [campaigns]);
  const cuts = useMemo(() => live.filter(c => c.verdict === 'Cut').sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [live]);
  const reduces = useMemo(() => live.filter(c => c.verdict === 'Reduce').sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [live]);
  const optimises = useMemo(() => live.filter(c => c.verdict === 'Optimise').sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [live]);

  // ONE Fix List: chronic underperformers (Cut/Reduce/Optimise), ranked by spend.
  // UI shows only material campaigns (≥₹500/d); the full list lives in Excel.
  const fixList = useMemo(() => [...cuts, ...reduces, ...optimises].sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [cuts, reduces, optimises]);
  const uiFixList = useMemo(() => fixList.filter(c => (c.drr?.spend || 0) >= 500), [fixList]);
  const scales = useMemo(() => live.filter(c => c.verdict === 'Scale' && (c.drr?.spend || 0) > 0).sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [live]);
  const revertHikes = useMemo(() => live.filter(c => c.iRoas != null && c.iRoas < 0.8).sort((a, b) => (b.iRoasDeltaSpend || 0) - (a.iRoasDeltaSpend || 0)), [live]);
  const deteriorating = useMemo(() => live.filter(c => c.trend === 'deteriorating' && c.verdict !== 'Cut' && c.verdict !== 'Reduce').sort((a, b) => (b.drr?.spend || 0) - (a.drr?.spend || 0)), [live]);
  const flips = useMemo(() => live.map(c => ({
    c,
    prev: prevMap[c.campaign.toLowerCase()]
  })).filter(x => x.prev && x.prev.verdict !== x.c.verdict && (x.c.verdict === 'Cut' || x.c.verdict === 'Reduce') && ['Scale', 'Maintain', 'Optimise'].includes(x.prev.verdict)).sort((a, b) => (b.c.drr?.spend || 0) - (a.c.drr?.spend || 0)), [live, prevMap]);

  // Qty drops at KEYWORD level (from Cat Sales aggregation, organic excluded).
  // Ranked by share-of-sales lost (Δpp of brand×category total incl organic).
  // A drop that is inline with a category-wide dip = market problem, not ads.
  const qtyDrops = useMemo(() => {
    if (!catCurr.length || !catPrev || !catPrev.length) return [];
    const tot = {},
      totP = {};
    catCurr.forEach(r => {
      const k = r.brand + '||' + r.category;
      tot[k] = (tot[k] || 0) + (r.drrDQ || 0);
    });
    catPrev.forEach(r => {
      const k = r.brand + '||' + r.category;
      totP[k] = (totP[k] || 0) + (r.drrDQ || 0);
    });
    const pm = {};
    catPrev.forEach(r => {
      pm[`${r.brand}||${r.category}||${r.segment}||${r.keyword}`] = r;
    });
    const out = [];
    catCurr.forEach(r => {
      if (r.segment === 'Organic') return;
      const pv = pm[`${r.brand}||${r.category}||${r.segment}||${r.keyword}`];
      if (!pv) return;
      const pq = pv.drrDQ || 0,
        cq = r.drrDQ || 0;
      if (pq < 3 || (pq - cq) / pq < 0.3) return;
      const ck = r.brand + '||' + r.category;
      const contribNow = tot[ck] > 0 ? cq / tot[ck] * 100 : null;
      const contribPrev = totP[ck] > 0 ? pq / totP[ck] * 100 : null;
      const deltaPP = contribNow != null && contribPrev != null ? contribNow - contribPrev : null;
      const catChg = totP[ck] > 0 ? (tot[ck] - totP[ck]) / totP[ck] * 100 : null;
      out.push({
        r,
        pv,
        pq,
        cq,
        contribNow,
        contribPrev,
        deltaPP,
        catChg
      });
    });
    return out.sort((a, b) => (a.deltaPP ?? 0) - (b.deltaPP ?? 0));
  }, [catCurr, catPrev]);
  const inlineVerdict = (deltaPP, catChg) => {
    if (deltaPP == null || catChg == null) return '';
    if (Math.abs(deltaPP) < 0.3 && catChg < -10) return `INLINE with category dip (cat ▼${Math.abs(catChg).toFixed(0)}%) — market issue, not ads`;
    if (deltaPP < 0 && catChg < -5) return `share lost ON TOP of category dip (cat ▼${Math.abs(catChg).toFixed(0)}%) — ads problem`;
    if (deltaPP < 0) return `pure share loss (category ${catChg >= 0 ? '+' : ''}${catChg.toFixed(0)}%) — competition or rank`;
    return '';
  };

  // Keyword bleeders: campaign healthy overall, but ≥20% of its spend sits in
  // keywords running <50% of the campaign's own ROAS. Surgical fix — cut/reprice
  // those keywords, keep the campaign. (Mostly a Comp-campaign disease.)
  const kwBleeders = useMemo(() => {
    const byCamp = {};
    kwCamp.forEach(k => {
      const ck = (k.campaign || '').toLowerCase();
      if (!byCamp[ck]) byCamp[ck] = {
        campaign: k.campaign,
        brand: k.brand,
        segment: k.segment,
        spend: 0,
        sales: 0,
        kws: []
      };
      byCamp[ck].spend += k.spend || 0;
      byCamp[ck].sales += k.directSales || 0;
      byCamp[ck].kws.push(k);
    });
    const out = [];
    Object.values(byCamp).forEach(c => {
      if (c.spend < 10000) return;
      const croas = c.spend > 0 ? c.sales / c.spend : 0;
      if (croas <= 0) return;
      const bleed = c.kws.filter(k => (k.spend || 0) >= 1000 && k.roas != null && k.roas < 0.5 * croas);
      const bleedSpend = bleed.reduce((s, k) => s + k.spend, 0);
      if (bleedSpend / c.spend < 0.2) return;
      out.push({
        ...c,
        croas,
        bleed: bleed.sort((a, b) => b.spend - a.spend),
        bleedSpend,
        bleedPct: bleedSpend / c.spend * 100,
        numDays: c.kws[0]?.numDays || 1
      });
    });
    return out.sort((a, b) => b.bleedSpend - a.bleedSpend);
  }, [kwCamp]);
  const cutSavings = cuts.reduce((s, c) => s + (c.drr?.spend || 0), 0);
  const reduceSavings = reduces.reduce((s, c) => s + (c.drr?.spend || 0) * 0.25, 0);
  const alertRisk = alerts.slice(0, 15).reduce((s, a) => s + a.severity, 0);
  const totalActions = uiFixList.length + revertHikes.length + flips.length + qtyDrops.length + Math.min(kwBleeders.length, 8) + Math.min(alerts.length, 10) + Math.min(kwAlerts.length, 8);

  // ── ACTION TEXT — constraint-aware (budget floor ₹500/d, CPM floor ₹200) ──

  const breachList = c => {
    const bm = BENCHMARKS[c.segment];
    if (!bm) return '';
    const b = [];
    if (c.roas != null && c.roas < bm.roasF) b.push(`ROAS ${c.roas.toFixed(2)}x < floor ${bm.roasF}`);
    if (c.nur != null && c.nur < bm.nurF) b.push(`NUR ${(c.nur * 100).toFixed(0)}% < floor ${(bm.nurF * 100).toFixed(0)}%`);
    if (c.ltvCac != null && c.ltvCac < bm.ltvF) b.push(`LTV:CAC ${c.ltvCac.toFixed(2)}x < floor ${bm.ltvF}`);
    return b.join('; ');
  };
  const reduceAction = c => {
    const b = c.currentDailyBudget;
    if (b != null && b <= 500) return `At ₹500 budget floor already — CANNOT reduce. Cut it or fix conversion. ${breachList(c)}`;
    if (b != null && b * 0.75 < 500) return `Reduce to ₹500 (the floor — a full 25% cut would breach it). ${breachList(c)}`;
    return `Reduce budget 25%${b != null ? ` to ₹${Math.round(Math.max(500, b * 0.75)).toLocaleString('en-IN')}` : ''} — saves ~${fmt((c.drr?.spend || 0) * 0.25, 'rsk')}/d. ${breachList(c)}`;
  };
  const optimiseAction = c => {
    const bm = BENCHMARKS[c.segment];
    if (!bm) return 'Review — no benchmarks for segment';
    if (c.ltvCac != null && c.ltvCac < bm.ltvF) {
      if (c.avgCpm != null && c.avgCpm <= 210) return `CPM already at ₹200 floor — CANNOT lower. LTV:CAC ${fmt(c.ltvCac, 'x')} < floor ${fmt(bm.ltvF, 'x')}: fix conversion or cut (CAC ${c.cac != null ? fmt(c.cac, 'rs') : '—'} vs LTV ₹${c.ltv || '—'})`;
      return `LOWER CPM to ~₹${Math.round(Math.max(200, (c.avgCpm || 250) * 0.85))}: LTV:CAC ${fmt(c.ltvCac, 'x')} < floor ${fmt(bm.ltvF, 'x')} — paying too much per new user (CAC ${c.cac != null ? fmt(c.cac, 'rs') : '—'} vs LTV ₹${c.ltv || '—'})`;
    }
    if (c.roas != null && c.roas < bm.roasF) return `HOLD CPM, FIX CONVERSION: ROAS ${fmt(c.roas, 'x')} < floor ${fmt(bm.roasF, 'x')} — impressions fine, conversion weak; check price/pack/competitor offer`;
    if (c.nur != null && c.nur < bm.nurF) return `NUR ${fmt(c.nur, '%')} < floor ${fmt(bm.nurF, '%')} — buying repeat customers; shift spend toward generic/comp terms for acquisition`;
    return 'One metric near floor — monitor closely';
  };
  const fixAction = c => {
    if (c.verdict === 'Cut') return `Pause — saves ${fmt(c.drr?.spend, 'rsk')}/d. ${breachList(c) || 'Score below cut line'}`;
    if (c.verdict === 'Reduce') return reduceAction(c);
    return optimiseAction(c);
  };
  const scaleAction = c => {
    const hrs = c.hoursPerDay && c.hoursPerDay > 0 && c.hoursPerDay < 23.5 ? c.hoursPerDay : null;
    if (c.utilization != null && c.utilization >= 0.85) {
      const extra = (c.currentDailyBudget || c.drr?.spend || 0) * 0.2;
      const est = (c.roas || 0) * extra;
      return `RAISE BUDGET +20% (est. +${fmt(est, 'rsk')}/d sales at ${fmt(c.roas, 'x')}). Why: util ${(c.utilization * 100).toFixed(0)}%${hrs ? `, live only ${hrs.toFixed(0)}h/day — budget exhausts early, campaign goes dark rest of day` : ' — budget is the binding constraint, demand exceeds cap'}`;
    }
    if (c.utilization != null && c.utilization < 0.7) {
      const unspent = Math.max(0, (c.currentDailyBudget || 0) - (c.drr?.spend || 0));
      return `RAISE CPM, NOT BUDGET. Why: util only ${(c.utilization * 100).toFixed(0)}% — ${fmt(unspent, 'rsk')}/d budget already going unspent; visibility (rank ${c.avgPos != null ? c.avgPos.toFixed(1) : '—'}) is the constraint, not money`;
    }
    const hrsTxt = hrs ? `, ${hrs.toFixed(0)}h/day live` : '';
    return `RAISE BUDGET +15–20%. Why: all metrics above floor, util ${c.utilization != null ? (c.utilization * 100).toFixed(0) + '%' : 'n/a'}${hrsTxt} — efficient headroom`;
  };
  const qtyDriver = (c, pv) => {
    const pi = pv.drr?.impressions || 0,
      ci = c.drr?.impressions || 0;
    if (pi > 0 && (pi - ci) / pi >= 0.2) return `visibility: impr ${fmt(ci, 'int')}/d vs ${fmt(pi, 'int')}/d (▼${Math.round((pi - ci) / pi * 100)}%)`;
    if (pv.roas != null && c.roas != null && pv.roas > 0 && (pv.roas - c.roas) / pv.roas >= 0.2) return `conversion: ROAS ${pv.roas.toFixed(1)}x → ${c.roas.toFixed(1)}x`;
    if (pv.avgPos != null && c.avgPos != null && c.avgPos - pv.avgPos >= 1) return `rank slipped ${pv.avgPos.toFixed(1)} → ${c.avgPos.toFixed(1)}`;
    const ps = pv.drr?.spend || 0,
      cs = c.drr?.spend || 0;
    if (ps > 0 && (ps - cs) / ps >= 0.2) return `spend cut: ${fmt(cs, 'rsk')}/d vs ${fmt(ps, 'rsk')}/d`;
    return 'mixed — open campaign detail';
  };
  const reasonFor = c => {
    if (c.verdict === 'Cut' || c.verdict === 'Reduce' || c.verdict === 'Optimise') return fixAction(c);
    if (c.verdict === 'Scale') return scaleAction(c);
    if (c.verdict === 'Maintain') return 'Healthy — no action needed';
    return c.verdict;
  };

  // ── EXCEL EXPORT ──────────────────────────────────────────────────────────
  const metricRow = (c, reason) => {
    const pv = prevMap[c.campaign.toLowerCase()];
    return {
      'Campaign': c.campaign,
      'Action / Reason': reason,
      'Brand': c.brand || '',
      'Category': c.category || '',
      'Segment': SEG_SHORT[c.segment] || c.segment || '',
      'Verdict': c.verdict,
      'Spend/d': Math.round(c.drr?.spend || 0),
      'Sales/d': Math.round(c.drr?.directSales || 0),
      'D.ROAS': c.roas != null ? +c.roas.toFixed(2) : null,
      'NUR %': c.nur != null ? +(c.nur * 100).toFixed(1) : null,
      'LTV:CAC': c.ltvCac != null ? +c.ltvCac.toFixed(2) : null,
      'CAC': c.cac != null ? Math.round(c.cac) : null,
      'Rank': c.avgPos != null ? +c.avgPos.toFixed(1) : null,
      'CPM': c.avgCpm != null ? Math.round(c.avgCpm) : null,
      'Impr/d': Math.round(c.drr?.impressions || 0),
      'NU/d': +(c.drr?.newUsers || 0).toFixed(1),
      'DQty/d': +(c.drr?.totalQty || 0).toFixed(1),
      'ΔDQty/d': pv ? +((c.drr?.totalQty || 0) - (pv.drr?.totalQty || 0)).toFixed(1) : null,
      'ΔSpend/d': pv ? Math.round((c.drr?.spend || 0) - (pv.drr?.spend || 0)) : null,
      'ΔSales/d': pv ? Math.round((c.drr?.directSales || 0) - (pv.drr?.directSales || 0)) : null,
      'Budget/d': c.currentDailyBudget != null ? Math.round(c.currentDailyBudget) : null,
      'Util %': c.utilization != null ? +(c.utilization * 100).toFixed(0) : null,
      'Hrs Live/d': c.hoursPerDay ? +c.hoursPerDay.toFixed(1) : null,
      'Score': c.score != null ? Math.round(c.score) : null,
      'Score 7d': c.score7 != null ? Math.round(c.score7) : null,
      'Trend': c.trend || '',
      'Days Live': c.daysLive,
      'CPMxImpr': c.avgCpm != null && c.drr?.impressions ? Math.round(c.avgCpm * c.drr.impressions) : null,
      'RankxImpr': c.avgPos != null && c.drr?.impressions ? Math.round(c.avgPos * c.drr.impressions) : null
    };
  };

  // Filter-aware blended subtotals for campaign-grain sheets
  const CAMP_SPEC = {
    'Spend/d': 'sum',
    'Sales/d': 'sum',
    'Impr/d': 'sum',
    'NU/d': 'sum',
    'DQty/d': 'sum',
    'ΔDQty/d': 'sum',
    'ΔSpend/d': 'sum',
    'ΔSales/d': 'sum',
    'Budget/d': 'sum',
    'D.ROAS': {
      num: 'Sales/d',
      den: 'Spend/d'
    },
    'NUR %': {
      num: 'NU/d',
      den: 'DQty/d',
      scale: 100
    },
    'CAC': {
      num: 'Spend/d',
      den: 'NU/d'
    },
    'Util %': {
      num: 'Spend/d',
      den: 'Budget/d',
      scale: 100
    },
    'CPM': {
      num: 'CPMxImpr',
      den: 'Impr/d'
    },
    'Rank': {
      num: 'RankxImpr',
      den: 'Impr/d'
    }
  };
  const exportExcel = () => {
    const X = window.XLSX;
    if (!X) {
      alert('Excel library not loaded — check internet connection and reload.');
      return;
    }
    const wb = X.utils.book_new();
    const colLetter = i => {
      let s = '';
      i++;
      while (i > 0) {
        s = String.fromCharCode(65 + (i - 1) % 26) + s;
        i = Math.floor((i - 1) / 26);
      }
      return s;
    };
    const colWidths = rows => Object.keys(rows[0]).map(k => ({
      wch: Math.min(50, Math.max(10, k.length + 2, ...rows.slice(0, 60).map(r => String(r[k] ?? '').length + 1)))
    }));

    // simple sheet: header row 1, autofilter, data from row 2
    const addSheet = (name, rows) => {
      if (!rows || rows.length === 0) return;
      const ws = X.utils.json_to_sheet(rows);
      ws['!autofilter'] = {
        ref: ws['!ref']
      };
      ws['!cols'] = colWidths(rows);
      X.utils.book_append_sheet(wb, ws, name.slice(0, 31));
    };

    // sheet with live SUBTOTAL formula row on top (row1=formulas, row2=headers, data row3+)
    // SUBTOTAL(9,...) recalculates on filtering; ratios divide the subtotals (true blends)
    const addSheetSub = (name, rows, spec) => {
      if (!rows || rows.length === 0) return;
      const headers = Object.keys(rows[0]);
      const dataStart = 3,
        dataEnd = rows.length + 2;
      const subRow = headers.map((h, i) => {
        const sp = spec[h];
        const L = colLetter(i);
        if (sp === 'sum') return {
          t: 'n',
          f: `SUBTOTAL(9,${L}${dataStart}:${L}${dataEnd})`
        };
        if (sp && sp.num !== undefined) {
          const nL = colLetter(headers.indexOf(sp.num)),
            dL = colLetter(headers.indexOf(sp.den));
          const expr = `SUBTOTAL(9,${nL}${dataStart}:${nL}${dataEnd})/SUBTOTAL(9,${dL}${dataStart}:${dL}${dataEnd})`;
          return {
            t: 'n',
            f: `IFERROR(${sp.scale ? sp.scale + '*' : ''}${expr},"")`
          };
        }
        return i === 0 ? 'FILTERED TOTAL →' : '';
      });
      const aoa = [subRow, headers, ...rows.map(r => headers.map(h => r[h]))];
      const ws = X.utils.aoa_to_sheet(aoa);
      ws['!autofilter'] = {
        ref: `A2:${colLetter(headers.length - 1)}${dataEnd}`
      };
      ws['!cols'] = colWidths(rows);
      X.utils.book_append_sheet(wb, ws, name.slice(0, 31));
    };
    addSheet('Alerts', mergedAlerts.map(a => ({
      'Level': a.lvl,
      'Campaign': a.campaign || '',
      'Keyword(s)': a.kw || '',
      'Flags': a.flags.map(f => f.label).join(' | '),
      'Diagnosis': a.cause || a.flags[0]?.detail || '',
      'Severity Rs-d': Math.round(a.sev),
      'Brand': a.brand || '',
      'Category': a.category || '',
      'Segment': a.segment ? SEG_SHORT[a.segment] || a.segment : '',
      'Spend/d baseline': Math.round(a.baseSpend),
      'Spend/d now': Math.round(a.recSpend),
      'Impr/d baseline': a.baseImpr != null ? Math.round(a.baseImpr) : '',
      'Impr/d now': a.recImpr != null ? Math.round(a.recImpr) : ''
    })));
    addSheetSub('Fix List', fixList.map(c => metricRow(c, fixAction(c))), CAMP_SPEC);
    addSheet('KW Bleeders', kwBleeders.flatMap(c => c.bleed.map(k => ({
      'Campaign': c.campaign,
      'Brand': c.brand || '',
      'Segment': SEG_SHORT[c.segment] || c.segment || '',
      'Campaign ROAS': +c.croas.toFixed(2),
      'Bleed % of camp': +c.bleedPct.toFixed(0),
      'Keyword': k.keyword,
      'KW Spend/d': Math.round((k.spend || 0) / c.numDays),
      'KW ROAS': k.roas != null ? +k.roas.toFixed(2) : null,
      'KW Rank': k.avgPos != null ? +k.avgPos.toFixed(1) : null,
      'KW CPM': k.avgCpm != null ? Math.round(k.avgCpm) : null,
      'Action': k.roas < 0.25 * c.croas ? 'Cut keyword' : 'Lower CPM (₹200 floor)'
    }))));
    addSheet('Revert Hikes', revertHikes.map(c => ({
      ...metricRow(c, `Revert budget hike — extra spend returning only ${fmt(c.iRoas, 'x')} incremental`),
      'Hike Date': c.lastBudgetChange ? toISODate(c.lastBudgetChange) : '',
      'Extra Spend/d': Math.round(c.iRoasDeltaSpend || 0),
      'Extra Sales/d': Math.round(c.iRoasDeltaSales || 0),
      'Incremental ROAS': c.iRoas != null ? +c.iRoas.toFixed(2) : null
    })));
    // Qty Drops — keyword level, contribution-led
    addSheet('Qty Drops', qtyDrops.map(({
      r,
      pq,
      cq,
      contribNow,
      contribPrev,
      deltaPP,
      catChg
    }) => ({
      'Keyword': r.keyword,
      'Brand': r.brand || '',
      'Category': r.category || '',
      'Segment': SEG_SHORT[r.segment] || r.segment || '',
      'Δ Contribution pp': deltaPP != null ? +deltaPP.toFixed(2) : null,
      'Contrib prev %': contribPrev != null ? +contribPrev.toFixed(2) : null,
      'Contrib now %': contribNow != null ? +contribNow.toFixed(2) : null,
      'Δ units/d': +(cq - pq).toFixed(1),

function App() {
  const [appState, setAppState] = useState(null);
  const [tab, setTab] = useState('brief');
  const handleLoad = useCallback(({
    allRows,
    ltvMap,
    campaignIndexMap,
    salesAgg,
    kwVolume
  }) => {
    const bounds = getDateBounds(allRows);
    const endDate = bounds.max;
    // Default: MTD
    const startDate = new Date(endDate.getFullYear(), endDate.getMonth(), 1);
    setAppState({
      allRows,
      ltvMap,
      campaignIndexMap: campaignIndexMap || {},
      salesAgg: salesAgg || {},
      kwVolume: kwVolume || {},
      bounds,
      startDate: startDate < bounds.min ? bounds.min : startDate,
      endDate,
      compareMode: 'lastMonthMTD',
      compareStart: null,
      compareEnd: null
    });
  }, []);
  const onDateChange = useCallback((s, e) => {
    setAppState(prev => prev ? {
      ...prev,
      startDate: s,
      endDate: e
    } : prev);
  }, []);
  const onCompareModeChange = useCallback(mode => {
    setAppState(prev => prev ? {
      ...prev,
      compareMode: mode
    } : prev);
  }, []);
  const onCompareRangeChange = useCallback((cs, ce) => {
    setAppState(prev => prev ? {
      ...prev,
      compareStart: cs,
      compareEnd: ce
