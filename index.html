function metricScore(v, floor, healthy, strong) {
  if (v === null || v === undefined || isNaN(v)) return null;
  if (v >= strong) return 100;
  if (v >= healthy) return 70 + 30 * (v - healthy) / (strong - healthy);
  if (v >= floor) return 40 + 30 * (v - floor) / (healthy - floor);
  return Math.max(0, 40 * v / floor);
}
function computeVerdict(roas, nur, ltvCac, score, bm, isInactive, isInsuf) {
  if (isInactive) return 'Inactive';
  if (isInsuf) return 'Insufficient Data';
  if (!bm) return 'Unindexed';
  let breaches = 0;
  if (roas !== null && roas < bm.roasF) breaches++;
  if (nur !== null && nur < bm.nurF) breaches++;
  if (ltvCac !== null && ltvCac < bm.ltvF) breaches++;
  if (breaches >= 3) return 'Cut';
  if (breaches === 2 && (score === null || score < 20)) return 'Cut';
  if (breaches === 2) return 'Reduce';
  if (breaches === 1) return 'Optimise';
  if (score === null) return 'Insufficient Data';
  if (score >= 70) return 'Scale';
  if (score >= 50) return 'Maintain';
  if (score >= 35) return 'Optimise';
  if (score >= 20) return 'Reduce';
  return 'Cut';
}
function mColor(v, floor, healthy, strong) {
  if (v === null || v === undefined || isNaN(v)) return '#4b5563';
  if (strong != null && v >= strong) return '#22c55e';
  if (healthy != null && v >= healthy) return '#3b82f6';
  if (floor != null && v >= floor) return '#f59e0b';
  return '#ef4444';
}
function fmt(n, type) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (type === 'rs') return '₹' + Math.round(n).toLocaleString('en-IN');
  if (type === 'rsk') return n >= 100000 ? '₹' + (n / 100000).toFixed(1) + 'L' : n >= 1000 ? '₹' + (n / 1000).toFixed(0) + 'K' : '₹' + Math.round(n);
  if (type === 'x') return n.toFixed(2) + 'x';
  if (type === '%') return (n * 100).toFixed(0) + '%';
  if (type === 'int') return Math.round(n).toLocaleString('en-IN');
  return n.toFixed(1);
}
function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v.getTime()) ? null : v;
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d.getTime()) ? null : d;
  }
  if (typeof v === 'string') {
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}
function colIdx(headers, ...names) {
  for (const n of names) {
    const i = headers.findIndex(h => String(h || '').trim().toLowerCase() === n.toLowerCase());
    if (i >= 0) return i;
  }
  for (const n of names) {
    const nl = n.toLowerCase();
    const i = headers.findIndex(h => String(h || '').trim().toLowerCase().includes(nl));
    if (i >= 0) return i;
  }
  return -1;
}

// ─── CSV PARSER ──────────────────────────────────────────────────────────────

function parseCSV(text) {
  const rows = [];
  let row = [],
    field = '',
    inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i + 1] === '"') {
        field += '"';
        i++;
      } else {
        inQuote = !inQuote;
      }
    } else if (c === ',' && !inQuote) {
      row.push(field);
      field = '';
    } else if ((c === '\n' || c === '\r') && !inQuote) {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field);
      field = '';
      if (row.length > 0) rows.push(row);
      row = [];
    } else {
      field += c;
    }
  }
  if (field !== '' || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}

// ─── FRAMEWORK PARSING FROM ROW ARRAYS ───────────────────────────────────────

function parseFrameworkFromRows(raRows, niRows, condRows) {
  const segmentMap = {};
  const metaMap = {};
  const ltvMap = {
    ...LTV_TABLE
  };

  // Rough Analysis: col A/B, F/G, J/K → campaign → segment
  if (raRows) {
    raRows.forEach(row => {
      const s0 = String(row[0] || '').trim(),
        s1 = String(row[1] || '').trim();
      const s5 = String(row[5] || '').trim(),
        s6 = String(row[6] || '').trim();
      const s9 = String(row[9] || '').trim(),
        s10 = String(row[10] || '').trim();
      if (s0 && s1 && !s0.toLowerCase().includes('campaign name') && !s0.toLowerCase().includes('head?')) segmentMap[s0.toLowerCase()] = s1;
      if (s5 && s6 && !s5.toLowerCase().includes('campaign name') && !s5.toLowerCase().includes('type')) segmentMap[s5.toLowerCase()] = s6;
      if (s9 && s10 && !s9.toLowerCase().includes('campaign name') && !s9.toLowerCase().includes('type')) segmentMap[s9.toLowerCase()] = s10;
    });
  }

  // New Index: col G/H/I (index 6/7/8) → campaign → brand, category
  if (niRows) {
    niRows.forEach(row => {
      const name = String(row[6] || '').trim();
      if (name && !name.toLowerCase().includes('campaign name') && name.length > 3) {
        const brand = String(row[7] || '').trim();
        const category = String(row[8] || '').trim();
        if (brand || category) {
          metaMap[name.toLowerCase()] = {
            brand,
            category
          };
        }
      }
    });
  }

  // Conditions: LTV table — find 'GC Category' row, read until blank/section-end
  if (condRows) {
    let inLtv = false;
    for (const row of condRows) {
      const a = String(row[0] || '').trim();
      if (a.toLowerCase() === 'gc category') {
        inLtv = true;
        continue;
      }
      if (inLtv) {
        if (!a || a.startsWith('B.') || a.startsWith('--')) break;
        const ltv = parseFloat(row[3]);
        if (a && !isNaN(ltv) && ltv > 0) ltvMap[a.toLowerCase()] = ltv;
      }
    }
  }
  return {
    segmentMap,
    metaMap,
    ltvMap
  };
}

// ─── FETCH FRAMEWORK FROM GOOGLE SHEETS ──────────────────────────────────────

async function fetchFrameworkFromSheets() {
  const [raText, niText, condText] = await Promise.all([fetch(SHEET_BASE + 'Rough%20Analysis').then(r => {
    if (!r.ok) throw new Error('Rough Analysis fetch failed');
    return r.text();
  }), fetch(SHEET_BASE + 'New%20Index').then(r => {
    if (!r.ok) throw new Error('New Index fetch failed');
    return r.text();
  }), fetch(SHEET_BASE + 'Conditions').then(r => {
    if (!r.ok) throw new Error('Conditions fetch failed');
    return r.text();
  })]);
  const raRows = parseCSV(raText);
  const niRows = parseCSV(niText);
  const condRows = parseCSV(condText);
  return parseFrameworkFromRows(raRows, niRows, condRows);
}

// ─── FRAMEWORK PARSER (from uploaded file, fallback) ─────────────────────────

function parseFramework(buffer) {
  const wb = XLSX.read(buffer, {
    type: 'array',
    cellDates: true
  });
  const raRows = wb.Sheets['Rough Analysis'] ? XLSX.utils.sheet_to_json(wb.Sheets['Rough Analysis'], {
    header: 1,
    defval: ''
  }) : null;
  const niRows = wb.Sheets['New Index'] ? XLSX.utils.sheet_to_json(wb.Sheets['New Index'], {
    header: 1,
    defval: ''
  }) : null;
  const condRows = wb.Sheets['Conditions'] ? XLSX.utils.sheet_to_json(wb.Sheets['Conditions'], {
    header: 1,
    defval: ''
  }) : null;
  return parseFrameworkFromRows(raRows, niRows, condRows);
}

// ─── RAW REPORT PARSER ───────────────────────────────────────────────────────

function parseRawReport(buffer, segmentMap, metaMap, ltvMap) {
  const wb = XLSX.read(buffer, {
    type: 'array',
    cellDates: true,
    raw: true
  });
  const campaignData = {};
  function processSheet(sheetName, type, extractor) {
    const ws = wb.Sheets[sheetName];
    if (!ws) return;
    const rows = XLSX.utils.sheet_to_json(ws, {
      header: 1,
      defval: 0,
      raw: true
    });
    if (rows.length < 2) return;
    const headers = rows[0].map(h => String(h || '').trim());
    rows.slice(1).forEach(row => {
      const r = extractor(row, headers);
      if (!r || !r.campaign || r.campaign === '0') return;
      const key = r.campaign.trim();
      if (!campaignData[key]) campaignData[key] = {
        type,
        rows: []
      };
      campaignData[key].rows.push(r);
    });
  }

  // Keyword Targeting (Search)
  processSheet('Keyword Targeting', 'Search', (row, h) => {
    const iCamp = colIdx(h, 'Campaign Name'),
      iDate = colIdx(h, 'date_ist'),
      iImp = colIdx(h, 'Impressions'),
      iPos = colIdx(h, 'Most Viewed Position'),
      iNU = colIdx(h, 'New Users'),
      iDS = colIdx(h, 'Direct Sales'),
      iDQ = colIdx(h, 'Direct Quantities Sold'),
      iIQ = colIdx(h, 'Indirect Quantities Sold'),
      iSp = colIdx(h, 'Estimated Budget Consumed');
    return {
      campaign: String(row[iCamp] || '').trim(),
      date: parseDate(row[iDate]),
      impressions: Number(row[iImp]) || 0,
      position: Number(row[iPos]) || null,
      newUsers: Number(row[iNU]) || 0,
      directSales: Number(row[iDS]) || 0,
      directQty: Number(row[iDQ]) || 0,
      indirectQty: Number(row[iIQ]) || 0,
      spend: Number(row[iSp]) || 0,
      asset: null,
      layout: null
    };
  });

  // Product Recommendation (Reco)
  processSheet('Product Recommendation', 'Reco', (row, h) => {
    const iCamp = colIdx(h, 'Campaign Name'),
      iDate = colIdx(h, 'date_ist'),
      iImp = colIdx(h, 'Impressions'),
      iAsset = colIdx(h, 'Asset'),
      iNU = colIdx(h, 'New Users'),
      iDS = colIdx(h, 'Direct Sales'),
      iDQ = colIdx(h, 'Direct Quantities Sold'),
      iIQ = colIdx(h, 'Indirect Quantities Sold'),
      iSp = colIdx(h, 'Estimated Budget Consumed');
    return {
      campaign: String(row[iCamp] || '').trim(),
      date: parseDate(row[iDate]),
      impressions: Number(row[iImp]) || 0,
      position: null,
      newUsers: Number(row[iNU]) || 0,
      directSales: Number(row[iDS]) || 0,
      directQty: Number(row[iDQ]) || 0,
      indirectQty: Number(row[iIQ]) || 0,
      spend: Number(row[iSp]) || 0,
      asset: String(row[iAsset] || '').trim(),
      layout: null
    };
  });

  // Product Shelf (Display)
  processSheet('Product Shelf', 'Display', (row, h) => {
    const iCamp = colIdx(h, 'Campaign Name'),
      iDate = colIdx(h, 'date_ist'),
      iImp = colIdx(h, 'Impressions'),
      iLayout = colIdx(h, 'Targeting Layout'),
      iNU = colIdx(h, 'New Users'),
      iDS = colIdx(h, 'Direct Sales'),
      iDQ = colIdx(h, 'Direct Quantities Sold'),
      iIQ = colIdx(h, 'Indirect Quantities Sold'),
      iSp = colIdx(h, 'Estimated Budget Consumed');
    return {
      campaign: String(row[iCamp] || '').trim(),
      date: parseDate(row[iDate]),
      impressions: Number(row[iImp]) || 0,
      position: null,
      newUsers: Number(row[iNU]) || 0,
      directSales: Number(row[iDS]) || 0,
      directQty: Number(row[iDQ]) || 0,
      indirectQty: Number(row[iIQ]) || 0,
      spend: Number(row[iSp]) || 0,
      asset: null,
      layout: String(row[iLayout] || '').trim()
    };
  });

  // Find global max date
  let maxDate = null;
  Object.values(campaignData).forEach(c => c.rows.forEach(r => {
    if (r.date && (!maxDate || r.date > maxDate)) maxDate = r.date;
  }));
  if (!maxDate) return [];
  const campaigns = [];
  Object.entries(campaignData).forEach(([name, data]) => {
    const lookback = data.type === 'Display' ? 15 : 7;
    const cutoff = new Date(maxDate.getTime() - lookback * 86400000);
    const winRows = data.rows.filter(r => r.date && r.date >= cutoff);
    const allDates = [...new Set(data.rows.map(r => r.date?.toDateString()).filter(Boolean))];
    const lastRow = data.rows.reduce((m, r) => r.date && r.date > (m?.date || 0) ? r : m, null);
    const daysSinceLive = lastRow?.date ? (maxDate - lastRow.date) / 86400000 : 999;

    // Segment
    let segment = segmentMap[name.toLowerCase()];
    if (!segment && data.type === 'Reco') {
      const assets = data.rows.map(r => r.asset).filter(Boolean);
      segment = assets[0] || 'Unindexed';
    }
    if (!segment && data.type === 'Display') {
      const layout = data.rows[0]?.layout || '';
      if (layout === 'feed') segment = 'Homepage Display Direct shelf';else if (layout === 'plp') segment = 'Category Display Direct shelf';else if (name.toLowerCase().includes('homepage')) segment = 'Homepage Display Direct shelf';else if (name.toLowerCase().includes('category')) segment = 'Category Display Direct shelf';else segment = 'Unindexed';
    }
    if (!segment) segment = 'Unindexed';
    const meta = metaMap[name.toLowerCase()] || {
      brand: '',
      category: ''
    };
    const totSpend = winRows.reduce((s, r) => s + r.spend, 0);
    const totDS = winRows.reduce((s, r) => s + r.directSales, 0);
    const totNU = winRows.reduce((s, r) => s + r.newUsers, 0);
    const totDQ = winRows.reduce((s, r) => s + r.directQty, 0);
    const totIQ = winRows.reduce((s, r) => s + r.indirectQty, 0);
    const totImp = winRows.reduce((s, r) => s + r.impressions, 0);
    let avgPos = null;
    if (data.type === 'Search') {
      const posRows = winRows.filter(r => r.position && r.position > 0 && r.impressions > 0);
      if (posRows.length > 0) {
        const totI = posRows.reduce((s, r) => s + r.impressions, 0);
        avgPos = posRows.reduce((s, r) => s + r.position * r.impressions, 0) / (totI || 1);
      }
    }
    const roas = totSpend > 0 && totDS > 0 ? totDS / totSpend : totSpend > 0 ? 0 : null;
    const totQty = totDQ + totIQ;
    const nur = totQty > 0 ? totNU / totQty : null;
